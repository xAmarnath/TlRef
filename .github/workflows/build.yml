name: Build TL Documentation

on:
  workflow_dispatch:
    inputs:
      schema_url:
        description: 'URL to schema.tl file (optional)'
        required: false
        default: ''
      workers:
        description: 'Number of parallel workers for scraping'
        required: false
        default: '15'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download schema.tl
        run: |
          # Use the user-provided URL if given, else pull the canonical TDesktop dev schema.
          url="${{ github.event.inputs.schema_url }}"
          if [ -z "$url" ]; then
            url="https://raw.githubusercontent.com/telegramdesktop/tdesktop/dev/Telegram/SourceFiles/mtproto/scheme/api.tl"
          fi
          curl -fsSL -o schema.tl "$url"

      - name: Download E2E schema (secret-chat)
        run: |
          curl -fsSL -o e2e_schema.json https://core.telegram.org/schema/end-to-end-json || true

      - name: Restore scraper cache
        uses: actions/cache@v4
        with:
          path: .cache/scrape
          key: tl-scrape-${{ hashFiles('schema.tl') }}
          restore-keys: |
            tl-scrape-

      - name: Scrape TL documentation
        run: |
          python tl_doc_scraper.py schema.tl -o output.json -w ${{ github.event.inputs.workers }}

      - name: Clean stale public/ output
        run: |
          # Wipe everything except top-level dotfiles so renames/removals don't linger.
          # This is what makes the PR diff capture deletions instead of accumulating ghost files.
          rm -rf public
          mkdir -p public

      - name: Build HTML documentation
        run: |
          python build_html.py output.json -o public
          cp output.json public/tl.json

      - name: Guard against page-size regressions
        run: |
          # Big-list pages (constructors.html, methods.html, types.html, e2e.html, fat
          # union types like Update.html) legitimately list 100s of entries; everything
          # else should stay small. A regression that re-inlines the search index would
          # push every detail page back to ~800KB, which any of these thresholds catch.
          fail=0

          # Per-entry detail pages must stay <100KB (was 800KB before the fix).
          big=$(find public/constructors public/methods -name '*.html' -size +100k -printf '%s %p\n' | sort -rn)
          if [ -n "$big" ]; then
            echo "::error::Detail pages exceed 100KB — likely inline-asset regression:"
            echo "$big" | head -20
            fail=1
          fi

          # Total public/ tree must stay under 100MB (we expect ~30-40MB).
          total_kb=$(du -sk public | cut -f1)
          echo "public/ total size: ${total_kb} KB"
          if [ "$total_kb" -gt 102400 ]; then
            echo "::error::public/ is ${total_kb} KB (>100 MB) — inline-asset regression likely"
            fail=1
          fi

          exit $fail

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'docs: update TL documentation'
          title: 'Update TL Documentation'
          body: |
            Automated update of TL documentation.

            - Scraped latest schema documentation
            - Regenerated HTML pages (additions, modifications, and deletions)
          branch: docs/update-tl-docs
          delete-branch: true
          add-paths: |
            public/**
            output.json
